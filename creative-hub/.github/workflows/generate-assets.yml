name: Organize Creative Assets

# Auto-triggers when files are dropped into creative-hub/inbox/
on:
  push:
    paths:
      - 'creative-hub/inbox/**'

  # Can also be triggered manually
  workflow_dispatch:

jobs:
  organize:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Sort inbox assets
        run: |
          INBOX="creative-hub/inbox"
          VIDEOS="creative-hub/assets/videos"
          IMAGES="creative-hub/assets/images"
          DESIGNS="creative-hub/assets/designs"

          mkdir -p "$VIDEOS" "$IMAGES" "$DESIGNS"

          MOVED=0

          for file in "$INBOX"/*; do
            [ -f "$file" ] || continue

            # Skip placeholder files
            basename=$(basename "$file")
            if [ "$basename" = ".gitkeep" ] || [ "$basename" = "DROP_FILES_HERE.md" ]; then
              continue
            fi

            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            EXT="${basename##*.}"
            NAME="${basename%.*}"
            SAFE_NAME=$(echo "$NAME" | tr ' ' '_' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9_-]//g')
            NEW_NAME="${TIMESTAMP}_${SAFE_NAME}.${EXT}"

            case "${EXT,,}" in
              # Video formats
              mp4|mov|avi|mkv|webm|m4v)
                mv "$file" "$VIDEOS/$NEW_NAME"
                echo "VIDEO: $basename → $VIDEOS/$NEW_NAME"
                ;;
              # Image formats
              jpg|jpeg|png|gif|webp|svg|bmp|tiff|heic)
                mv "$file" "$IMAGES/$NEW_NAME"
                echo "IMAGE: $basename → $IMAGES/$NEW_NAME"
                ;;
              # Design / other files
              psd|ai|fig|sketch|pdf|eps)
                mv "$file" "$DESIGNS/$NEW_NAME"
                echo "DESIGN: $basename → $DESIGNS/$NEW_NAME"
                ;;
              *)
                mv "$file" "$IMAGES/$NEW_NAME"
                echo "OTHER: $basename → $IMAGES/$NEW_NAME"
                ;;
            esac

            MOVED=$((MOVED + 1))
          done

          if [ "$MOVED" -eq 0 ]; then
            echo "No new files to organize."
            exit 0
          fi

          echo "Organized $MOVED file(s) from inbox."

      - name: Commit organized assets
        run: |
          git config user.name "jaystruckin"
          git config user.email "jaystruckin@users.noreply.github.com"
          git add creative-hub/assets/ creative-hub/inbox/
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "Auto-organize: sort inbox assets into videos/images/designs"
            git push
          fi
